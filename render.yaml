services:
  - type: web
    name: cre-intelligence
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app/cre_app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
